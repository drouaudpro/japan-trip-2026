<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#eff1f5;--card-bg:#ffffff;--header-bg:#ffffff;--tab-bg:#ffffff;--filter-bg:#fafafa;
  --resa-bg:#101014;--resa-item-bg:#1c1c24;--resa-item-border:#2c2c38;
  --border:#e8e8eb;--border-light:#f0f0f3;
  --text:#111111;--text-title:#111111;--text-dim:#888888;--text-faint:#aaaaaa;--text-body:#444444;
  --chip-bg:#f5f5f7;--tag-bg:#f4f4f5;--tag-border:#ebebed;--hover-bg:#fafafa;
  --amber-bg:#fffcf0;--amber-border:#f0b429;--amber-text:#6b5000;--amber-box-border:#f0e5a0;
  --info-border:#dddddd;--info-text:#666666;--info-bg:#f9f9f9;
  --book-border:#e53935;--book-text:#e53935;--book-bg:#fff5f5;
  --conf-border:#22a55a;--conf-text:#1b7a3d;--conf-bg:#f0fdf4;
  --map-border:#2980B9;--map-text:#2980B9;--map-bg:#eef6fc;
  --party-bg:#fff0f6;--party-border:#ffcce5;--party-text:#d44092;
  --depart-bg:#f0f7ff;--depart-border:#c5dff5;--depart-text:#1565c0;
  --booked-bg:#eefbf1;--booked-border:#b8e6c4;--booked-text:#1b7a3d;
}
body.dark{
  --bg:#0b0b10;--card-bg:#16161d;--header-bg:#13131a;--tab-bg:#13131a;--filter-bg:#101017;
  --resa-bg:#050508;--resa-item-bg:#1a1a22;--resa-item-border:#2a2a36;
  --border:#26262f;--border-light:#1e1e26;
  --text:#f0f0f0;--text-title:#f5f5f5;--text-dim:#9a9aa5;--text-faint:#7a7a86;--text-body:#c7c7d1;
  --chip-bg:#1a1a22;--tag-bg:#1e1e26;--tag-border:#2a2a34;--hover-bg:#1c1c24;
  --amber-bg:#241f0d;--amber-border:#f0b429;--amber-text:#e8c97a;--amber-box-border:#4a3f18;
  --info-border:#333340;--info-text:#c5c5cf;--info-bg:#191921;
  --book-border:#ff6b61;--book-text:#ff8078;--book-bg:#2a1414;
  --conf-border:#4ade80;--conf-text:#4ade80;--conf-bg:#0f2318;
  --map-border:#5aa9e6;--map-text:#5aa9e6;--map-bg:#10202c;
  --party-bg:#2a1420;--party-border:#5c2540;--party-text:#ff8fc0;
  --depart-bg:#0f1e2e;--depart-border:#254060;--depart-text:#6bb3f0;
  --booked-bg:#0f2318;--booked-border:#255c3a;--booked-text:#4ade80;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;min-height:100vh;font-size:14px;transition:background .25s,color .25s;}
a{color:inherit;text-decoration:none;}
.header{background:var(--header-bg);border-bottom:1px solid var(--border);padding:22px 20px 16px;text-align:center;position:relative;transition:background .25s,border-color .25s;}
.header h1{font-size:20px;font-weight:800;color:var(--text-title);letter-spacing:.8px;}
.header .sub{font-size:12px;color:var(--text-dim);margin-top:3px;}
.theme-toggle{position:absolute;top:18px;right:16px;width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--card-bg);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--text);transition:all .2s;}
.theme-toggle:hover{background:var(--hover-bg);}
.chips{display:flex;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
.chip{background:var(--chip-bg);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--text-dim);}
.chip strong{color:var(--text);font-weight:700;}
.resa-bar{background:var(--resa-bg);padding:10px 14px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap;transition:background .25s;}
.resa-lnk{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#fff;background:var(--resa-item-bg);border:1px solid var(--resa-item-border);border-radius:20px;padding:6px 13px;transition:all .15s;}
.resa-lnk:hover{background:#2a2a36;}
.resa-lnk .dot{width:6px;height:6px;border-radius:50%;background:#4ade80;}
.tabs{display:flex;justify-content:center;gap:4px;padding:11px 14px;background:var(--tab-bg);border-bottom:1px solid var(--border);flex-wrap:wrap;transition:background .25s,border-color .25s;}
.tab-btn{padding:6px 15px;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:var(--text-dim);transition:all .15s;}
.tab-btn:hover{background:var(--hover-bg);}
.tab-btn.active{background:var(--text-title);color:var(--bg);border-color:var(--text-title);}
.city-filter{display:flex;gap:6px;padding:9px 14px;overflow-x:auto;background:var(--filter-bg);border-bottom:1px solid var(--border);scrollbar-width:none;transition:background .25s,border-color .25s;}
.city-filter::-webkit-scrollbar{display:none;}
.cf-btn{padding:4px 13px;border-radius:20px;cursor:pointer;font-size:11px;font-weight:600;white-space:nowrap;transition:all .15s;background:transparent;}
.days-list{padding:12px 14px;display:flex;flex-direction:column;gap:8px;max-width:760px;margin:0 auto;}
.day-card{background:var(--card-bg);border-radius:10px;border:1px solid var(--border);overflow:hidden;transition:box-shadow .2s,background .25s,border-color .25s;}
.day-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);}
.day-card.expanded{box-shadow:0 3px 14px rgba(0,0,0,.1);}
.day-header{padding:13px 14px;cursor:pointer;display:flex;align-items:center;gap:11px;user-select:none;border-left:3px solid transparent;}
.day-num{width:36px;height:36px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;flex-shrink:0;}
.day-meta{flex:1;min-width:0;}
.day-date{font-size:10px;color:var(--text-faint);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.day-title{font-weight:700;font-size:14px;color:var(--text-title);margin-top:2px;}
.highlights{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.hl-tag{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--tag-bg);color:var(--text-dim);border:1px solid var(--tag-border);}
.chevron{color:var(--text-faint);font-size:12px;flex-shrink:0;transition:transform .2s;}
.day-content{border-top:1px solid var(--border-light);padding:0 14px 10px;}
.activity{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid var(--border-light);}
.activity:last-child{border-bottom:none;}
.act-time{width:42px;font-size:11px;color:var(--text-faint);padding-top:1px;flex-shrink:0;}
.act-icon{font-size:15px;flex-shrink:0;padding-top:1px;}
.act-body{flex:1;min-width:0;}
.act-name{font-weight:600;font-size:13px;color:var(--text-title);}
.act-sub{font-size:11px;color:var(--text-dim);margin-top:2px;line-height:1.5;}
.act-tip{margin-top:5px;padding:5px 9px;border-radius:5px;font-size:11px;line-height:1.4;background:var(--amber-bg);border-left:2px solid var(--amber-border);color:var(--amber-text);}
.act-links{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.lnk{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;text-decoration:none;transition:all .15s;white-space:nowrap;}
.lnk-book{border:1px solid var(--book-border);color:var(--book-text);background:var(--book-bg);}
.lnk-book:hover{background:var(--book-border);color:#fff;}
.lnk-confirmed{border:1px solid var(--conf-border);color:var(--conf-text);background:var(--conf-bg);}
.lnk-confirmed:hover{background:var(--conf-border);color:#fff;}
.lnk-info{border:1px solid var(--info-border);color:var(--info-text);background:var(--info-bg);}
.lnk-info:hover{background:var(--text-title);color:var(--bg);border-color:var(--text-title);}
.lnk-map{border:1px solid var(--map-border);color:var(--map-text);background:var(--map-bg);}
.lnk-map:hover{background:var(--map-border);color:#fff;}
.party-b{font-size:9px;padding:2px 7px;border-radius:4px;background:var(--party-bg);border:1px solid var(--party-border);color:var(--party-text);font-weight:700;}
.depart-b{font-size:9px;padding:2px 7px;border-radius:4px;background:var(--depart-bg);border:1px solid var(--depart-border);color:var(--depart-text);font-weight:700;}
.booked-b{font-size:9px;padding:2px 7px;border-radius:4px;background:var(--booked-bg);border:1px solid var(--booked-border);color:var(--booked-text);font-weight:700;}
.tips-section,.transport-section{padding:12px 14px;max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:8px;}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:background .25s,border-color .25s;}
.card-header{padding:13px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:13px;user-select:none;color:var(--text-title);}
.card-header:hover{background:var(--hover-bg);}
.card-body{border-top:1px solid var(--border-light);padding:0 16px 12px;}
.tip-row{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--border-light);font-size:12px;color:var(--text-body);line-height:1.5;}
.tip-row:last-child{border-bottom:none;}
.tip-dot{color:var(--text-faint);flex-shrink:0;padding-top:3px;font-size:9px;}
.route-card{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:0;transition:background .25s,border-color .25s;}
.route-section-title{font-size:10px;font-weight:700;color:var(--text-faint);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;}
.route-row{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--border-light);font-size:12px;gap:6px;}
.route-row:last-child{border-bottom:none;}
.route-from{flex:1;color:var(--text-body);}
.route-dur{color:var(--text-faint);font-size:11px;white-space:nowrap;min-width:55px;text-align:right;}
.route-price{font-weight:700;color:var(--text-title);white-space:nowrap;min-width:85px;text-align:right;}
.route-btn{font-size:10px;font-weight:600;color:var(--text-dim);border:1px solid var(--info-border);border-radius:4px;padding:2px 7px;white-space:nowrap;margin-left:6px;transition:all .15s;}
.route-btn:hover{background:var(--text-title);color:var(--bg);border-color:var(--text-title);}
.verdict-box{background:var(--amber-bg);border:1px solid var(--amber-box-border);border-radius:10px;padding:14px;font-size:12px;color:var(--text-body);line-height:1.7;}
.budget-card{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:14px;}
.budget-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-light);font-size:12px;color:var(--text-body);}
.budget-row:last-child{border-bottom:none;font-weight:700;color:var(--text-title);}
.tab-content{display:none;}
.tab-content.active{display:block;}
</style>
</head>

{f:"KIX → Osaka Namba",d:"45 min",p:"¥1 830 ICOCA",url:"https://www.westjr.co.jp/global/en/travel/shopping/access/train/"},
{f:"KIX → Kyoto (Haruka direct)",d:"75 min",p:"¥3 060",url:"https://www.westjr.co.jp/global/en/travel/shopping/access/train/"},
{f:"Akasaka → Haneda T3",d:"30-35 min",p:"¥600-700",url:"https://www.haneda-access.com/en/"},
]},
{title:"GRANDES LIGNES",rows:[
{f:"Osaka → Kyoto",d:"45-75 min",p:"¥570 JR Rapid",url:"https://www.westjr.co.jp/"},
{f:"Kyoto → Nara",d:"35 min",p:"¥1 160 Kintetsu",url:"https://www.kintetsu.co.jp/foreign/english/"},
{f:"Kyoto → Tokyo (Hikari)",d:"2h40",p:"¥13 720",url:"https://smart-ex.jp/en/"},
{f:"Kyoto → Tokyo (Nozomi)",d:"2h10",p:"¥14 170",url:"https://smart-ex.jp/en/"},
{f:"Tokyo → Kamakura",d:"55-60 min",p:"¥940 JR",url:"https://www.jreast.co.jp/e/"},
]},
{title:"TOKYO — DEPUIS AKASAKA (hôtel)",rows:[
{f:"Akasaka → Shibuya",d:"15-20 min",p:"¥200-260",url:"https://www.tokyometro.jp/en/"},
{f:"Akasaka → Shinjuku",d:"15-20 min",p:"¥200-260",url:"https://www.tokyometro.jp/en/"},
{f:"Akasaka → Omotesando (VENT)",d:"15-20 min",p:"¥170-220",url:"https://www.tokyometro.jp/en/"},
{f:"Akasaka → Asakusa",d:"25-30 min",p:"¥260-310",url:"https://www.tokyometro.jp/en/"},
{f:"Tokyo Metro 72h Pass",d:"Illimité",p:"¥1 500 🔥",url:"https://www.tokyometro.jp/en/ticket/travel/index.html"},
]},
];

const HOTELS=[
{city:"Osaka",n:"Hotel Forza Osaka Kitahama",dates:"27 → 28 Juillet (1 nuit)",addr:"2-2-21 Imabashi, Chuo-ku, Osaka",ci:"Check-in 14h (dépose bagages OK avant)",co:"Check-out 11h"},
{city:"Kyoto",n:"Hop Inn Kyoto Shijo Omiya",dates:"28 Juillet → 1 Août (4 nuits)",addr:"14-2 Mibubojocho, Nakagyo Ward, Kyoto",ci:"Check-in dès 15h",co:"Check-out 11h"},
{city:"Tokyo",n:"Akasaka Guesthouse HIVE",dates:"1 → 9 Août (8 nuits)",addr:"2-7-2 Akasaka RS Building, Minato-ku, Tokyo",ci:"Check-in 16h-21h",co:"Check-out 11h"},
];

let curCity='all',openD={},openT={},isDark=false;

function toggleTheme(){
  isDark=!isDark;
  document.body.classList.toggle('dark',isDark);
  document.getElementById('themeToggle').textContent=isDark?'☀️':'🌙';
}

function switchTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}

function filterCity(city,btn){
  curCity=city;
  document.querySelectorAll('.cf-btn').forEach(b=>{
    const dc=b.dataset.city;
    if(dc){const c=CITY[dc].c;b.style.background='transparent';b.style.color=c;b.style.borderColor=c;}
    else{b.style.background='transparent';b.style.color='var(--text-dim)';b.style.borderColor='var(--border)';}
  });
  if(city==='all'){btn.style.background='var(--text-title)';btn.style.color='var(--bg)';btn.style.borderColor='var(--text-title)';}
  else{const c=CITY[city].c;btn.style.background=c;btn.style.color='#fff';btn.style.borderColor=c;}
  renderDays();
}

function toggleDay(n){openD[n]=!openD[n];renderDays();}
function toggleTip(i){openT[i]=!openT[i];renderTips();}

function renderDays(){
  const fd=curCity==='all'?DAYS:DAYS.filter(d=>d.city===curCity);
  document.getElementById('daysList').innerHTML=fd.map(day=>{
    const ci=CITY[day.city],open=openD[day.n];
    const badge=day.special==='party'?`<span class="party-b">🎉 SOIRÉE VENT</span>`:
      day.special==='depart'?`<span class="depart-b">✈️ DÉPART</span>`:
      day.special==='booked'?`<span class="booked-b">✅ RÉSERVÉ</span>`:'';
    const acts=open?day.acts.map(a=>`<div class="activity">
      <div class="act-time">${a.t||''}</div>
      <div class="act-icon">${a.e}</div>
      <div class="act-body">
        <div class="act-name">${a.a}</div>
        <div class="act-sub">${a.s}</div>
        ${a.tip?`<div class="act-tip">${a.tip}</div>`:''}
        ${a.links&&a.links.length?`<div class="act-links">${a.links.join('')}</div>`:''}
      </div></div>`).join(''):'';
    return`<div class="day-card${open?' expanded':''}">
      <div class="day-header" style="border-left-color:${ci.c}" onclick="toggleDay(${day.n})">
        <div class="day-num" style="background:${ci.c}18;color:${ci.c};border:1px solid ${ci.c}33">J${day.n}</div>
        <div class="day-meta">
          <div class="day-date">${day.d} ${badge}</div>
          <div class="day-title">${day.title}</div>
          <div class="highlights">${day.hl.map(h=>`<span class="hl-tag">${h}</span>`).join('')}</div>
        </div>
        <div class="chevron" style="${open?'transform:rotate(180deg)':''}">▼</div>
      </div>
      ${open?`<div class="day-content">${acts}</div>`:''}
    </div>`;
  }).join('');
}

function renderTips(){
  document.getElementById('tipsGrid').innerHTML=TIPS.map((tg,i)=>`<div class="card">
    <div class="card-header" onclick="toggleTip(${i})">${tg.cat}
      <span class="chevron" style="${openT[i]?'transform:rotate(180deg)':''}">▼</span>
    </div>
    ${openT[i]?`<div class="card-body">${tg.items.map(it=>`<div class="tip-row"><span class="tip-dot">●</span><span>${it}</span></div>`).join('')}</div>`:''}
  </div>`).join('');
}

function renderTransport(){
  const cards=ROUTES.map(r=>`<div class="route-card">
    <div class="route-section-title">${r.title}</div>
    ${r.rows.map(rw=>`<div class="route-row">
      <div class="route-from">${rw.f}</div>
      <div class="route-dur">${rw.d}</div>
      <div class="route-price">${rw.p}</div>
      <a href="${rw.url}" target="_blank" rel="noopener" class="route-btn">→</a>
    </div>`).join('')}
  </div>`).join('');

  const hotels=`<div class="route-card">
    <div class="route-section-title">🏨 Hébergements</div>
    ${HOTELS.map(h=>`<div class="route-row" style="align-items:flex-start;flex-wrap:wrap">
      <div class="route-from" style="min-width:200px">
        <strong style="color:var(--text-title)">${h.n}</strong><br>
        <span style="font-size:11px;color:var(--text-faint)">${h.addr}</span><br>
        <span style="font-size:11px;color:var(--text-dim)">${h.dates} · ${h.ci} · ${h.co}</span>
      </div>
      <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(h.n+', '+h.addr)}" target="_blank" rel="noopener" class="route-btn">📍 Maps</a>
    </div>`).join('')}
  </div>`;

  const verdict=`<div class="verdict-box">
    <strong style="color:var(--amber-text)">Verdict JR Pass</strong> — Pour cet itinéraire, le JR Pass 14 jours (~¥50 000) <strong>n'est pas rentable</strong>. La somme des trajets réels est ~¥17 000-20 000.<br><br>
    <strong style="color:var(--text-title)">Recommandation optimale :</strong><br>
    · Carte ICOCA à KIX (~¥2 000 rechargeable)<br>
    · Shinkansen Kyoto → Tokyo acheté sur <a href="https://smart-ex.jp/en/" target="_blank" style="color:var(--map-text);text-decoration:underline">Smart EX</a> (~¥14 170)<br>
    · Tokyo Metro 72h Pass (~¥1 500)<br>
    <strong style="color:var(--conf-text)">Économie estimée vs JR Pass : ~¥28 000 💰</strong>
  </div>`;

  const budget=`<div class="budget-card">
    <div class="route-section-title" style="margin-bottom:10px">Budget estimatif / jour</div>
    <div class="budget-row"><span>🏨 Hébergement</span><span>¥4 000 – 8 000</span></div>
    <div class="budget-row"><span>🍜 Nourriture (3 repas)</span><span>¥3 000 – 6 000</span></div>
    <div class="budget-row"><span>🚇 Transport local</span><span>¥500 – 1 500</span></div>
    <div class="budget-row"><span>🏯 Entrées & activités</span><span>¥1 000 – 3 000</span></div>
    <div class="budget-row" style="padding-top:8px;margin-top:4px;border-top:1px solid var(--border-light)"><span>TOTAL / jour (hors JDM/VENT/teamLab)</span><span>¥8 000 – 18 500</span></div>
  </div>`;

  document.getElementById('transportSection').innerHTML=cards+hotels+verdict+budget;
}

renderDays();renderTips();renderTransport();
</script>
</body>
</html>
